<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harness Maker</title>
  <style>
    :root { --bg:#0f1115; --card:#181b22; --line:#2a2f3a; --fg:#e6e9ef; --mut:#9aa3b2; --acc:#6ea8fe; --ok:#7ee787; --err:#ff9d8a; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.55 system-ui, -apple-system, sans-serif; }
    main { max-width:720px; margin:0 auto; padding:28px 20px 120px; }
    h1 { font-size:21px; margin:0 0 16px; }
    .steps { display:flex; gap:8px; margin:0 0 22px; }
    .steps .s { flex:1; height:6px; border-radius:3px; background:var(--line); }
    .steps .s.active { background:var(--acc); }
    .steps .s.done { background:var(--ok); }
    .step-head { margin:0 0 18px; }
    .step-head h2 { font-size:18px; margin:0 0 4px; }
    .step-head p { color:var(--mut); margin:0; font-size:14px; }
    .field { margin:0 0 16px; }
    label { display:block; margin-bottom:5px; font-weight:600; }
    .req { color:var(--err); }
    .help { color:var(--mut); font-size:13px; font-weight:400; margin-bottom:6px; }
    input, select, textarea { width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px;
      background:#0c0e13; color:var(--fg); font:inherit; }
    textarea { min-height:64px; resize:vertical; }
    .card { border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin:0 0 12px; background:var(--card); }
    .card .row { display:flex; align-items:flex-start; gap:10px; }
    .card input[type=checkbox] { width:18px; height:18px; margin-top:3px; flex:none; }
    .card .meta b { display:block; }
    .card .meta span { color:var(--mut); font-size:13px; }
    .card .tag { font-size:11px; color:var(--acc); border:1px solid var(--line); border-radius:6px; padding:1px 6px; margin-left:6px; }
    .tokens { margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:none; }
    .tokens.show { display:block; }
    .msbox { display:flex; flex-wrap:wrap; gap:8px; }
    .msopt { display:flex; align-items:center; gap:6px; font-weight:400; margin:0;
      border:1px solid var(--line); border-radius:8px; padding:8px 12px; cursor:pointer; }
    .msopt input { width:16px; height:16px; }
    .chiplist { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
    .chiplist:empty { margin-bottom:0; }
    .chip { display:inline-flex; align-items:center; gap:6px; background:#0c2a4d;
      border:1px solid var(--acc); color:#cfe1ff; border-radius:999px; padding:4px 8px 4px 12px;
      font-size:13px; font-family:ui-monospace, monospace; }
    .chip .x { background:transparent; border:0; color:#9fc0ff; cursor:pointer; font-size:16px;
      line-height:1; padding:0 2px; }
    .chip .x:hover { color:#fff; }
    /* preview */
    main:has(#preview:not([hidden])) { max-width:1100px; }
    .preview { margin-top:8px; }
    .pv-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .pv-head h2 { font-size:18px; margin:0; }
    .pv-actions { display:flex; gap:8px; }
    .pv-actions button { border-radius:8px; padding:9px 14px; font-weight:600; cursor:pointer; border:1px solid var(--line); }
    .pv-actions .ghost { background:transparent; color:var(--fg); }
    .pv-actions .primary { background:var(--acc); color:#06183a; border-color:var(--acc); }
    .pv-body { display:flex; gap:0; border:1px solid var(--line); border-radius:10px; overflow:hidden; height:68vh; }
    .tree { width:300px; min-width:300px; overflow:auto; background:#0c0e13; border-right:1px solid var(--line); padding:10px 8px; font-size:13px; }
    .tree ul { list-style:none; margin:0; padding-left:14px; }
    .tree > ul { padding-left:2px; }
    .tfolder { color:var(--mut); padding:3px 6px; white-space:nowrap; }
    .tfile { padding:3px 6px; border-radius:6px; cursor:pointer; white-space:nowrap;
      font-family:ui-monospace, monospace; }
    .tfile:hover { background:#1b2230; }
    .tfile.sel { background:var(--acc); color:#06183a; }
    .viewer { flex:1; overflow:auto; padding:18px 22px; }
    .viewer pre { margin:0; white-space:pre-wrap; word-break:break-word; font:13px/1.5 ui-monospace, monospace; color:#dbe3f0; }
    /* markdown */
    .viewer.md { font-size:14px; line-height:1.65; }
    .viewer.md h1 { font-size:22px; border-bottom:1px solid var(--line); padding-bottom:6px; }
    .viewer.md h2 { font-size:18px; margin-top:22px; }
    .viewer.md h3 { font-size:15px; margin-top:18px; }
    .viewer.md code { background:#0c0e13; border:1px solid var(--line); border-radius:4px; padding:1px 5px;
      font-family:ui-monospace, monospace; font-size:12.5px; }
    .viewer.md pre { background:#0c0e13; border:1px solid var(--line); border-radius:8px; padding:12px; overflow:auto; }
    .viewer.md pre code { background:none; border:0; padding:0; }
    .viewer.md table { border-collapse:collapse; margin:12px 0; display:block; overflow:auto; }
    .viewer.md th, .viewer.md td { border:1px solid var(--line); padding:6px 10px; text-align:left; }
    .viewer.md th { background:#161922; }
    .viewer.md blockquote { border-left:3px solid var(--acc); margin:12px 0; padding:2px 14px; color:var(--mut); }
    .viewer.md a { color:var(--acc); }
    .viewer.md hr { border:0; border-top:1px solid var(--line); margin:18px 0; }
    .tokens .field { margin-bottom:10px; }
    .bar { position:fixed; left:0; right:0; bottom:0; background:#0c0e13; border-top:1px solid var(--line);
      padding:12px 20px; }
    .bar .inner { max-width:720px; margin:0 auto; display:flex; gap:10px; align-items:center; }
    button { border:0; border-radius:8px; padding:11px 18px; font-weight:700; cursor:pointer; font:inherit; }
    .primary { background:var(--acc); color:#06183a; }
    .ghost { background:transparent; color:var(--fg); border:1px solid var(--line); }
    .spacer { flex:1; }
    .msg { font-size:13px; white-space:pre-wrap; }
    .msg.err { color:var(--err); }
    .msg.ok { color:var(--ok); }
    .topbar { display:flex; align-items:center; justify-content:space-between; }
    p.sub { color:var(--mut); margin:2px 0 18px; font-size:14px; }
    .lang button { background:transparent; color:var(--mut); border:1px solid var(--line);
      border-radius:6px; padding:5px 10px; font-weight:600; cursor:pointer; }
    .lang button.on { background:var(--acc); color:#06183a; border-color:var(--acc); }
  </style>
</head>
<body>
<main>
  <div class="topbar">
    <h1>Harness Factory</h1>
    <div class="lang" id="lang">
      <button type="button" data-lang="ko">한국어</button>
      <button type="button" data-lang="en">EN</button>
    </div>
  </div>
  <p class="sub" id="sub"></p>
  <div class="steps" id="dots"></div>
  <div id="stepHead" class="step-head"></div>
  <form id="form" onsubmit="return false"></form>

  <section id="preview" class="preview" hidden>
    <div class="pv-head">
      <h2 id="pvTitle"></h2>
      <div class="pv-actions">
        <button class="ghost" id="pvBack" type="button"></button>
        <button class="primary" id="pvDownload" type="button"></button>
      </div>
    </div>
    <div class="pv-body">
      <div class="tree" id="tree"></div>
      <div class="viewer" id="viewer"></div>
    </div>
  </section>
</main>

<div class="bar" id="bar">
  <div class="inner">
    <button class="ghost" id="back" type="button">이전</button>
    <span class="spacer"></span>
    <span id="msg" class="msg"></span>
    <button class="ghost" id="skip" type="button">건너뛰기</button>
    <button class="primary" id="next" type="button">다음</button>
  </div>
</div>

<script src="/static/vendor/marked.min.js"></script>
<script>
const T = {
  ko: { sub: '몇 가지 설문에 답하면 바로 쓸 수 있는 에이전트 하네스를 zip으로 받습니다.',
        back: '이전', skip: '건너뛰기', next: '다음', gen: '하네스 생성 & 다운로드',
        generating: '생성 중...', failed: '검증 실패:\n', done: '다운로드 완료: ',
        needsToken: '인증키 필요', noToken: '토큰 불필요', keyPlaceholder: '인증키 입력 (선택)',
        eg: '예: ', chipHint: '경로 입력 후 Enter (예: .env)',
        preview: '미리보기', pvTitle: '생성될 파일 미리보기', download: 'zip 다운로드',
        backEdit: '← 수정으로', selectFile: '왼쪽에서 파일을 선택하세요' },
  en: { sub: 'Answer a few questions and download a ready-to-use agent harness as a zip.',
        back: 'Back', skip: 'Skip', next: 'Next', gen: 'Generate & Download',
        generating: 'Generating...', failed: 'Validation failed:\n', done: 'Downloaded: ',
        needsToken: 'token required', noToken: 'no token', keyPlaceholder: 'enter key (optional)',
        eg: 'e.g. ', chipHint: 'type a path, press Enter (e.g. .env)',
        preview: 'Preview', pvTitle: 'Preview generated files', download: 'Download zip',
        backEdit: '← Back to edit', selectFile: 'Select a file on the left' },
};
let LANG = 'ko';
let SURVEY = null, CATALOG = [];
let stepIdx = 0;
let answers = {};              // 일반 필드
let mcpSelected = new Set();   // 선택된 MCP id
let mcpTokens = {};            // { VAR: value }
let FILES = {};                // 미리보기: { path: content }

const form = document.getElementById('form');
const dots = document.getElementById('dots');
const stepHead = document.getElementById('stepHead');
const msg = document.getElementById('msg');
const btnBack = document.getElementById('back');
const btnSkip = document.getElementById('skip');
const btnNext = document.getElementById('next');
const sub = document.getElementById('sub');

function el(tag, props = {}, ...kids) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  kids.forEach(c => e.append(c));
  return e;
}

function fieldNode(f) {
  const wrap = el('div', { class: 'field' });
  const lab = el('label', { html: `${f.question}${f.required ? ' <span class="req">*</span>' : ''}` });
  wrap.append(lab);
  if (f.help) wrap.append(el('div', { class: 'help' }, f.help));

  let input;
  const cur = answers[f.key] ?? f.default ?? '';
  if (f.type === 'enum' && f.options) {
    input = el('select');
    f.options.forEach(o => {
      const opt = new Option(o, o);
      if (o === cur) opt.selected = true;
      input.append(opt);
    });
  } else if (f.type === 'combo' && f.options) {
    const listId = 'dl-' + f.key.replace(/\W/g, '');
    input = el('input', { type: 'text', list: listId, value: cur });
    if (f.example) input.placeholder = T[LANG].eg + f.example;
    const dl = el('datalist', { id: listId });
    f.options.forEach(o => dl.append(new Option(o, o)));
    wrap.append(input, dl);
    input.dataset.key = f.key; input.dataset.ftype = f.type;
    return wrap;
  } else if (f.type === 'list') {
    // 칩(chip) 입력: Enter/콤마로 추가, 추가된 경로는 아래 칩으로 표시
    const box = el('div', { class: 'chips' });
    box.dataset.key = f.key; box.dataset.ftype = 'list';
    const list = el('div', { class: 'chiplist' });
    const inp = el('input', { type: 'text', class: 'chipinput',
      placeholder: f.example ? T[LANG].eg + f.example : T[LANG].chipHint });
    const initial = Array.isArray(cur) ? cur
      : (typeof cur === 'string' && cur ? cur.split(',').map(s => s.trim()).filter(Boolean) : []);
    const addChip = (val) => {
      if (!val) return;
      const chip = el('span', { class: 'chip', 'data-val': val });
      chip.append(document.createTextNode(val));
      const x = el('button', { type: 'button', class: 'x', html: '&times;' });
      x.addEventListener('click', () => chip.remove());
      chip.append(x);
      list.append(chip);
    };
    initial.forEach(addChip);
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const v = inp.value.trim().replace(/,+$/, '').trim();
        if (v) { addChip(v); inp.value = ''; }
      }
    });
    box.append(list, inp);
    wrap.append(box);
    return wrap;
  } else if (f.type === 'multiselect' && f.options) {
    const box = el('div', { class: 'msbox' });
    box.dataset.key = f.key; box.dataset.ftype = 'multiselect';
    const chosen = Array.isArray(cur) ? cur : (Array.isArray(f.default) ? f.default : []);
    f.options.forEach(o => {
      const cb = el('input', { type: 'checkbox', value: o });
      if (chosen.includes(o)) cb.checked = true;
      box.append(el('label', { class: 'msopt' }, cb, document.createTextNode(' ' + o)));
    });
    wrap.append(box);
    return wrap;
  } else if (f.type === 'text') {
    input = el('textarea'); input.value = cur;
  } else {
    input = el('input', { type: 'text', value: Array.isArray(cur) ? cur.join(', ') : cur });
    if (f.example) input.placeholder = T[LANG].eg + f.example;
  }
  input.dataset.key = f.key; input.dataset.ftype = f.type;
  wrap.append(input);
  return wrap;
}

function mcpCard(s) {
  const checked = mcpSelected.has(s.id);
  const tokens = el('div', { class: 'tokens' + (checked ? ' show' : '') });
  (s.env || []).forEach(e => {
    const fw = el('div', { class: 'field' });
    fw.append(el('label', { html: e.label }));
    const inp = el('input', {
      type: e.secret ? 'password' : 'text',
      value: mcpTokens[e.var] || '',
      placeholder: e.secret ? T[LANG].keyPlaceholder : '',
    });
    inp.dataset.var = e.var;
    inp.addEventListener('input', () => { mcpTokens[e.var] = inp.value.trim(); });
    fw.append(inp);
    tokens.append(fw);
  });
  const cb = el('input', { type: 'checkbox' });
  cb.checked = checked;
  cb.addEventListener('change', () => {
    if (cb.checked) { mcpSelected.add(s.id); tokens.classList.add('show'); }
    else { mcpSelected.delete(s.id); tokens.classList.remove('show'); }
  });
  const tokenTag = `<span class="tag">${s.needs_token ? T[LANG].needsToken : T[LANG].noToken}</span>`;
  const meta = el('div', { class: 'meta' },
    el('b', { html: `${s.label} <span class="tag">${s.domain}</span>${tokenTag}` }),
    el('span', {}, s.description));
  const card = el('div', { class: 'card' }, el('div', { class: 'row' }, cb, meta));
  if ((s.env || []).length) card.append(tokens);
  return card;
}

function collectStep(step) {
  if (step.dynamic === 'mcp_catalog') return; // MCP는 실시간으로 수집됨
  form.querySelectorAll('[data-key]').forEach(node => {
    const key = node.dataset.key;
    if (node.dataset.ftype === 'multiselect') {
      const vals = [...node.querySelectorAll('input:checked')].map(c => c.value);
      if (vals.length) answers[key] = vals; else delete answers[key];
      return;
    }
    if (node.dataset.ftype === 'list') {
      const arr = [...node.querySelectorAll('.chip')].map(c => c.dataset.val);
      if (arr.length) answers[key] = arr; else delete answers[key];
      return;
    }
    let v = node.value.trim();
    if (v !== '') answers[key] = v;
    else delete answers[key];
  });
}

function clearStepFields(step) {
  (step.fields || []).forEach(f => delete answers[f.key]);
}

function render() {
  const steps = SURVEY.steps;
  const step = steps[stepIdx];
  // dots
  dots.innerHTML = '';
  steps.forEach((_, i) => dots.append(el('div', { class: 's' + (i === stepIdx ? ' active' : i < stepIdx ? ' done' : '') })));
  // head
  stepHead.innerHTML = `<h2>${step.label}</h2><p>${step.description || ''}</p>`;
  // body
  form.innerHTML = '';
  if (step.dynamic === 'mcp_catalog') {
    CATALOG.forEach(s => form.append(mcpCard(s)));
  } else {
    (step.fields || []).forEach(f => form.append(fieldNode(f)));
  }
  // controls
  btnBack.style.visibility = stepIdx === 0 ? 'hidden' : 'visible';
  btnSkip.style.display = step.skippable ? 'inline-block' : 'none';
  btnBack.textContent = T[LANG].back;
  btnSkip.textContent = T[LANG].skip;
  btnNext.textContent = stepIdx === steps.length - 1 ? T[LANG].preview : T[LANG].next;
  msg.textContent = '';
}

function curPayload() {
  return {
    answers: { ...answers, 'mcp.servers': [...mcpSelected], 'mcp.tokens': mcpTokens },
    project_slug: (answers['project.name'] || 'harness').toString(),
    lang: LANG,
  };
}

// ---- 미리보기 ----
function buildTree(paths) {
  const root = { _children: {} };
  paths.forEach(p => {
    const parts = p.split('/');
    let node = root;
    parts.forEach((part, i) => {
      const isFile = i === parts.length - 1;
      node._children = node._children || {};
      if (!node._children[part])
        node._children[part] = { _name: part, _path: parts.slice(0, i + 1).join('/'), _isFile: isFile };
      node = node._children[part];
    });
  });
  return root;
}

function renderTreeInto(container, node) {
  const ul = el('ul');
  Object.values(node._children || {})
    .sort((a, b) => (!!b._children - !!a._children) || a._name.localeCompare(b._name))
    .forEach(ch => {
      const li = el('li');
      if (ch._children) {
        li.append(el('div', { class: 'tfolder' }, document.createTextNode('📁 ' + ch._name)));
        renderTreeInto(li, ch);
      } else {
        const f = el('div', { class: 'tfile', 'data-path': ch._path }, document.createTextNode('📄 ' + ch._name));
        f.addEventListener('click', () => selectFile(ch._path, f));
        li.append(f);
      }
      ul.append(li);
    });
  container.append(ul);
}

function selectFile(path, node) {
  document.querySelectorAll('.tfile.sel').forEach(n => n.classList.remove('sel'));
  if (node) node.classList.add('sel');
  const viewer = document.getElementById('viewer');
  const content = FILES[path] ?? '';
  if ((path.endsWith('.md') || path.endsWith('.mdc')) && window.marked) {
    viewer.className = 'viewer md';
    viewer.innerHTML = marked.parse(content);
  } else {
    viewer.className = 'viewer';
    viewer.innerHTML = '';
    const pre = el('pre'); pre.textContent = content; viewer.append(pre);
  }
}

function setPreviewVisible(v) {
  document.getElementById('preview').hidden = !v;
  ['dots', 'stepHead', 'form'].forEach(id => document.getElementById(id).style.display = v ? 'none' : '');
  document.getElementById('bar').style.display = v ? 'none' : '';
}

async function showPreview() {
  msg.className = 'msg'; msg.textContent = T[LANG].generating;
  const res = await fetch('/api/preview', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(curPayload()),
  });
  if (!res.ok) {
    let d = res.statusText;
    try { d = (await res.json()).detail || d; } catch (_) {}
    msg.className = 'msg err'; msg.textContent = T[LANG].failed + d;
    return;
  }
  msg.textContent = '';
  FILES = (await res.json()).files;
  const tree = document.getElementById('tree'); tree.innerHTML = '';
  renderTreeInto(tree, buildTree(Object.keys(FILES)));
  document.getElementById('pvTitle').textContent = T[LANG].pvTitle;
  document.getElementById('pvBack').textContent = T[LANG].backEdit;
  document.getElementById('pvDownload').textContent = T[LANG].download;
  const prefer = Object.keys(FILES).find(p => /(CLAUDE|AGENTS?|overview)\.(md|mdc)$/.test(p)) || Object.keys(FILES)[0];
  selectFile(prefer, [...document.querySelectorAll('.tfile')].find(n => n.dataset.path === prefer));
  setPreviewVisible(true);
}

async function downloadZip() {
  const payload = curPayload();
  const res = await fetch('/api/generate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
  });
  if (!res.ok) return;
  const blob = await res.blob();
  const a = el('a', { href: URL.createObjectURL(blob), download: payload.project_slug + '.zip' });
  a.click(); URL.revokeObjectURL(a.href);
}

btnNext.addEventListener('click', () => {
  const step = SURVEY.steps[stepIdx];
  collectStep(step);
  if (stepIdx === SURVEY.steps.length - 1) { showPreview(); return; }
  stepIdx++; render();
});
btnSkip.addEventListener('click', () => {
  clearStepFields(SURVEY.steps[stepIdx]);
  if (stepIdx === SURVEY.steps.length - 1) { showPreview(); return; }
  stepIdx++; render();
});
btnBack.addEventListener('click', () => { if (stepIdx > 0) { stepIdx--; render(); } });
document.getElementById('pvBack').addEventListener('click', () => setPreviewVisible(false));
document.getElementById('pvDownload').addEventListener('click', downloadZip);

async function load(lang) {
  LANG = lang;
  // 언어 전환 시 답변 초기화(옵션 값이 언어별로 다르므로)
  answers = {}; mcpSelected = new Set(); mcpTokens = {}; stepIdx = 0;
  setPreviewVisible(false);
  document.querySelectorAll('#lang button').forEach(b => b.classList.toggle('on', b.dataset.lang === lang));
  sub.textContent = T[lang].sub;
  const data = await (await fetch('/api/survey?lang=' + lang)).json();
  SURVEY = data; CATALOG = data.mcp_catalog || [];
  render();
}

document.querySelectorAll('#lang button').forEach(b =>
  b.addEventListener('click', () => { if (b.dataset.lang !== LANG) load(b.dataset.lang); }));

load('ko');
</script>
</body>
</html>
