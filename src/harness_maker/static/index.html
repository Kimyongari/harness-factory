<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harness Maker</title>
  <style>
    :root { --bg:#0f1115; --card:#181b22; --line:#2a2f3a; --fg:#e6e9ef; --mut:#9aa3b2; --acc:#6ea8fe; --ok:#7ee787; --err:#ff9d8a; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.55 system-ui, -apple-system, sans-serif; }
    main { max-width:720px; margin:0 auto; padding:28px 20px 120px; }
    h1 { font-size:21px; margin:0 0 16px; }
    .steps { display:flex; gap:8px; margin:0 0 22px; }
    .steps .s { flex:1; height:6px; border-radius:3px; background:var(--line); }
    .steps .s.active { background:var(--acc); }
    .steps .s.done { background:var(--ok); }
    .step-head { margin:0 0 18px; }
    .step-head h2 { font-size:18px; margin:0 0 4px; }
    .step-head p { color:var(--mut); margin:0; font-size:14px; }
    .field { margin:0 0 16px; }
    label { display:block; margin-bottom:5px; font-weight:600; }
    .req { color:var(--err); }
    .help { color:var(--mut); font-size:13px; font-weight:400; margin-bottom:6px; }
    input, select, textarea { width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px;
      background:#0c0e13; color:var(--fg); font:inherit; }
    textarea { min-height:64px; resize:vertical; }
    .card { border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin:0 0 12px; background:var(--card); }
    .card .row { display:flex; align-items:flex-start; gap:10px; }
    .card input[type=checkbox] { width:18px; height:18px; margin-top:3px; flex:none; }
    .card .meta b { display:block; }
    .card .meta span { color:var(--mut); font-size:13px; }
    .card .tag { font-size:11px; color:var(--acc); border:1px solid var(--line); border-radius:6px; padding:1px 6px; margin-left:6px; }
    .tokens { margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:none; }
    .tokens.show { display:block; }
    .msbox { display:flex; flex-wrap:wrap; gap:8px; }
    .msopt { display:flex; align-items:center; gap:6px; font-weight:400; margin:0;
      border:1px solid var(--line); border-radius:8px; padding:8px 12px; cursor:pointer; }
    .msopt input { width:16px; height:16px; }
    .tokens .field { margin-bottom:10px; }
    .bar { position:fixed; left:0; right:0; bottom:0; background:#0c0e13; border-top:1px solid var(--line);
      padding:12px 20px; }
    .bar .inner { max-width:720px; margin:0 auto; display:flex; gap:10px; align-items:center; }
    button { border:0; border-radius:8px; padding:11px 18px; font-weight:700; cursor:pointer; font:inherit; }
    .primary { background:var(--acc); color:#06183a; }
    .ghost { background:transparent; color:var(--fg); border:1px solid var(--line); }
    .spacer { flex:1; }
    .msg { font-size:13px; white-space:pre-wrap; }
    .msg.err { color:var(--err); }
    .msg.ok { color:var(--ok); }
  </style>
</head>
<body>
<main>
  <h1>Harness Maker</h1>
  <div class="steps" id="dots"></div>
  <div id="stepHead" class="step-head"></div>
  <form id="form" onsubmit="return false"></form>
</main>

<div class="bar">
  <div class="inner">
    <button class="ghost" id="back" type="button">이전</button>
    <span class="spacer"></span>
    <span id="msg" class="msg"></span>
    <button class="ghost" id="skip" type="button">건너뛰기</button>
    <button class="primary" id="next" type="button">다음</button>
  </div>
</div>

<script>
let SURVEY = null, CATALOG = [];
let stepIdx = 0;
const answers = {};            // 일반 필드
const mcpSelected = new Set(); // 선택된 MCP id
const mcpTokens = {};          // { VAR: value }

const form = document.getElementById('form');
const dots = document.getElementById('dots');
const stepHead = document.getElementById('stepHead');
const msg = document.getElementById('msg');
const btnBack = document.getElementById('back');
const btnSkip = document.getElementById('skip');
const btnNext = document.getElementById('next');

function el(tag, props = {}, ...kids) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  kids.forEach(c => e.append(c));
  return e;
}

function fieldNode(f) {
  const wrap = el('div', { class: 'field' });
  const lab = el('label', { html: `${f.question}${f.required ? ' <span class="req">*</span>' : ''}` });
  wrap.append(lab);
  if (f.help) wrap.append(el('div', { class: 'help' }, f.help));

  let input;
  const cur = answers[f.key] ?? f.default ?? '';
  if (f.type === 'enum' && f.options) {
    input = el('select');
    f.options.forEach(o => {
      const opt = new Option(o, o);
      if (o === cur) opt.selected = true;
      input.append(opt);
    });
  } else if (f.type === 'combo' && f.options) {
    const listId = 'dl-' + f.key.replace(/\W/g, '');
    input = el('input', { type: 'text', list: listId, value: cur });
    if (f.example) input.placeholder = '예: ' + f.example;
    const dl = el('datalist', { id: listId });
    f.options.forEach(o => dl.append(new Option(o, o)));
    wrap.append(input, dl);
    input.dataset.key = f.key; input.dataset.ftype = f.type;
    return wrap;
  } else if (f.type === 'multiselect' && f.options) {
    const box = el('div', { class: 'msbox' });
    box.dataset.key = f.key; box.dataset.ftype = 'multiselect';
    const chosen = Array.isArray(cur) ? cur : (Array.isArray(f.default) ? f.default : []);
    f.options.forEach(o => {
      const cb = el('input', { type: 'checkbox', value: o });
      if (chosen.includes(o)) cb.checked = true;
      box.append(el('label', { class: 'msopt' }, cb, document.createTextNode(' ' + o)));
    });
    wrap.append(box);
    return wrap;
  } else if (f.type === 'text') {
    input = el('textarea'); input.value = cur;
  } else {
    input = el('input', { type: 'text', value: Array.isArray(cur) ? cur.join(', ') : cur });
    if (f.example) input.placeholder = '예: ' + f.example;
  }
  input.dataset.key = f.key; input.dataset.ftype = f.type;
  wrap.append(input);
  return wrap;
}

function mcpCard(s) {
  const checked = mcpSelected.has(s.id);
  const tokens = el('div', { class: 'tokens' + (checked ? ' show' : '') });
  (s.env || []).forEach(e => {
    const fw = el('div', { class: 'field' });
    fw.append(el('label', { html: e.label }));
    const inp = el('input', {
      type: e.secret ? 'password' : 'text',
      value: mcpTokens[e.var] || '',
      placeholder: e.secret ? '인증키 입력 (선택)' : '',
    });
    inp.dataset.var = e.var;
    inp.addEventListener('input', () => { mcpTokens[e.var] = inp.value.trim(); });
    fw.append(inp);
    tokens.append(fw);
  });
  const cb = el('input', { type: 'checkbox' });
  cb.checked = checked;
  cb.addEventListener('change', () => {
    if (cb.checked) { mcpSelected.add(s.id); tokens.classList.add('show'); }
    else { mcpSelected.delete(s.id); tokens.classList.remove('show'); }
  });
  const tokenTag = s.needs_token ? '<span class="tag">인증키 필요</span>' : '<span class="tag">토큰 불필요</span>';
  const meta = el('div', { class: 'meta' },
    el('b', { html: `${s.label} <span class="tag">${s.domain}</span>${tokenTag}` }),
    el('span', {}, s.description));
  const card = el('div', { class: 'card' }, el('div', { class: 'row' }, cb, meta));
  if ((s.env || []).length) card.append(tokens);
  return card;
}

function collectStep(step) {
  if (step.dynamic === 'mcp_catalog') return; // MCP는 실시간으로 수집됨
  form.querySelectorAll('[data-key]').forEach(node => {
    const key = node.dataset.key;
    if (node.dataset.ftype === 'multiselect') {
      const vals = [...node.querySelectorAll('input:checked')].map(c => c.value);
      if (vals.length) answers[key] = vals; else delete answers[key];
      return;
    }
    let v = node.value.trim();
    if (node.dataset.ftype === 'list') {
      const arr = v ? v.split(',').map(x => x.trim()).filter(Boolean) : [];
      if (arr.length) answers[key] = arr; else delete answers[key];
    } else if (v !== '') answers[key] = v;
    else delete answers[key];
  });
}

function clearStepFields(step) {
  (step.fields || []).forEach(f => delete answers[f.key]);
}

function render() {
  const steps = SURVEY.steps;
  const step = steps[stepIdx];
  // dots
  dots.innerHTML = '';
  steps.forEach((_, i) => dots.append(el('div', { class: 's' + (i === stepIdx ? ' active' : i < stepIdx ? ' done' : '') })));
  // head
  stepHead.innerHTML = `<h2>${step.label}</h2><p>${step.description || ''}</p>`;
  // body
  form.innerHTML = '';
  if (step.dynamic === 'mcp_catalog') {
    CATALOG.forEach(s => form.append(mcpCard(s)));
  } else {
    (step.fields || []).forEach(f => form.append(fieldNode(f)));
  }
  // controls
  btnBack.style.visibility = stepIdx === 0 ? 'hidden' : 'visible';
  btnSkip.style.display = step.skippable ? 'inline-block' : 'none';
  btnNext.textContent = stepIdx === steps.length - 1 ? '하네스 생성 & 다운로드' : '다음';
  msg.textContent = '';
}

async function generate() {
  msg.className = 'msg'; msg.textContent = '생성 중...';
  const payload = {
    answers: { ...answers, 'mcp.servers': [...mcpSelected], 'mcp.tokens': mcpTokens },
    project_slug: (answers['project.name'] || 'harness').toString(),
  };
  const res = await fetch('/api/generate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
  });
  if (!res.ok) {
    let d = res.statusText;
    try { d = (await res.json()).detail || d; } catch (_) {}
    msg.className = 'msg err'; msg.textContent = '검증 실패:\n' + d;
    return;
  }
  const blob = await res.blob();
  const a = el('a', { href: URL.createObjectURL(blob), download: payload.project_slug + '.zip' });
  a.click(); URL.revokeObjectURL(a.href);
  msg.className = 'msg ok'; msg.textContent = '다운로드 완료: ' + payload.project_slug + '.zip';
}

btnNext.addEventListener('click', () => {
  const step = SURVEY.steps[stepIdx];
  collectStep(step);
  if (stepIdx === SURVEY.steps.length - 1) { generate(); return; }
  stepIdx++; render();
});
btnSkip.addEventListener('click', () => {
  clearStepFields(SURVEY.steps[stepIdx]);
  if (stepIdx === SURVEY.steps.length - 1) { generate(); return; }
  stepIdx++; render();
});
btnBack.addEventListener('click', () => { if (stepIdx > 0) { stepIdx--; render(); } });

(async function init() {
  const data = await (await fetch('/api/survey')).json();
  SURVEY = data; CATALOG = data.mcp_catalog || [];
  render();
})();
</script>
</body>
</html>
