# =============================================================================
# survey.yaml — 설문 매니페스트 (4단계 위저드, UI가 소비하는 단일 진실 공급원)
# =============================================================================
# 플레이스홀더 규약: 템플릿 파일의 {{FILL:key}} 가 아래 fields[].key 로 치환된다.
#
# 필드 타입:
#   string  : 한 줄 입력
#   text    : 여러 줄 입력
#   list    : 쉼표로 구분 → 리스트
#   enum    : 드롭다운(목록에서만 선택)
#   combo   : 드롭다운 + 직접 입력 가능(목록은 추천값)
#
# 스텝:
#   skippable: true 면 사용자가 건너뛸 수 있고, 그 경우 각 필드의 default 가 적용된다.
#   step 4(인증/MCP)는 mcp_catalog.yaml 기반으로 UI가 동적 렌더링한다.
# =============================================================================

meta:
  placeholder_pattern: "{{FILL:KEY}}"
  required_block_build: true

steps:

  # ============================================================ STEP 1: 프로젝트
  - id: project
    label: "1. 프로젝트"
    description: "어떤 프로젝트인가요? 기본 정보만 알려주세요."
    skippable: false
    fields:
      - key: target.tools
        question: "어떤 AI 코딩 도구용으로 만들까요?"
        help: "복수 선택하면 각 도구 형식으로 함께 만들어집니다."
        type: multiselect
        required: true
        default: ["Claude Code"]
        options: ["Claude Code", "Codex", "Cursor"]

      - key: project.name
        question: "프로젝트 이름"
        type: string
        required: true
        example: "payments-api"

      - key: project.description
        question: "한 문장 설명"
        help: "이 프로젝트가 무엇을 하는지 한 문장으로."
        type: string
        required: true
        example: "결제 승인/정산을 담당하는 내부 API 서비스"

      - key: project.language
        question: "주 언어"
        type: combo
        required: true
        default: "Python"
        options: ["Python", "JavaScript", "TypeScript", "Java", "Go", "Rust", "C#", "Ruby", "PHP", "Kotlin"]

      - key: project.language_version
        question: "런타임 버전"
        help: "모르면 비워도 됩니다."
        type: combo
        required: false
        default: ""
        options:
          ["Python 3.13", "Python 3.12", "Python 3.11", "Python 3.10",
           "Node 22", "Node 20", "Node 18",
           "Java 21", "Java 17", "Go 1.22", "Rust stable", ".NET 8"]

      - key: project.framework
        question: "주 프레임워크"
        help: "없으면 '없음'."
        type: combo
        required: false
        default: "없음"
        options:
          ["없음", "FastAPI", "Django", "Flask", "Spring Boot",
           "React", "Next.js", "Vue", "Express", "NestJS", "Ruby on Rails"]

      - key: project.package_manager
        question: "패키지 매니저"
        type: combo
        required: true
        default: "pip"
        options: ["pip", "uv", "poetry", "npm", "pnpm", "yarn", "gradle", "maven", "cargo", "go mod"]

      - key: profile.role
        question: "에이전트가 맡을 역할"
        type: enum
        required: true
        default: "backend"
        options: ["backend", "frontend", "fullstack", "data", "devops", "mobile"]

      - key: profile.expertise
        question: "기대하는 코드 수준"
        type: enum
        required: false
        default: "미드레벨"
        options: ["주니어", "미드레벨", "시니어"]

  # ====================================================== STEP 2: 개발 컨벤션
  - id: dev
    label: "2. 개발 컨벤션"
    description: "건너뛰면 안전한 기본값이 적용됩니다. 아는 것만 채워도 됩니다."
    skippable: true
    fields:
      - key: dev.install_cmd
        question: "의존성 설치 명령"
        type: string
        required: false
        default: ""
        example: "uv sync"
      - key: hooks.pre_commit
        question: "커밋 전(pre-commit) 검사"
        help: "커밋할 때마다 자동 실행됩니다. 빠른 검사(린트·포맷·타입체크)를 고르세요. 선택한 항목으로 .scripts/pre-commit.sh 가 생성됩니다."
        type: checkselect
        required: false
        default: ["ruff-lint", "ruff-format"]
      - key: hooks.post_commit
        question: "커밋 후(post-commit) 검사"
        help: "커밋 후 실행됩니다. 보통 무거운 검사(테스트)를 고르세요. 선택한 항목으로 .scripts/post-commit.sh 가 생성되며 verify.sh가 이를 실행합니다."
        type: checkselect
        required: false
        default: ["pytest"]
      - key: dev.run_cmd
        question: "로컬 실행 명령"
        type: string
        required: false
        default: ""
        example: "uvicorn app.main:app --reload"

      - key: dev.never_touch
        question: "에이전트가 절대 건드리면 안 되는 경로"
        help: "경로를 입력하고 Enter로 추가하세요. 추가된 경로가 아래 칩으로 표시됩니다. 비워도 안전한 기본값이 적용됩니다."
        type: list
        required: false
        default: ".env, secrets/, .venv/, node_modules/"
        example: ".env"

      # 레이어 의존성 방향: 일반 사용자가 이해하기 어려워 설문에서는 숨긴다(ui_hidden).
      # 키는 유지하므로 템플릿 치환·경계 검사는 그대로 동작하고, 기본값(빈 값)이면 검사를 건너뛴다.
      - key: dev.architecture_layers
        question: "레이어 의존성 방향"
        type: combo
        required: false
        ui_hidden: true
        default: ""

      - key: dev.branch_strategy
        question: "어디서 작업하고 커밋할까요?"
        help: "에이전트가 코드를 어느 작업 공간에서 다룰지 정합니다. ▸ '새 브랜치를 파서 작업'은 작업 폴더 하나를 다른 브랜치로 갈아끼우는 방식이라 한 번에 한 작업만 다루고, 바꿀 때마다 하던 일을 저장·정리해야 합니다(비유: 책상 하나에 서류를 바꿔 깔기). ▸ 'git worktree로 작업'은 작업마다 폴더를 따로 펼쳐 여러 작업을 동시에 진행하고 서로 섞이지 않으며 main을 깨끗하게 보존합니다(비유: 작업마다 책상을 따로 펼치기 / 병렬 작업에 유리). ▸ '기본 브랜치에 직접 작업'은 브랜치를 나누지 않고 바로 커밋하는 가장 단순한 방식입니다. 모르겠으면 기본값(새 브랜치)을 두세요. 선택에 따라 development 스킬의 '브랜치 전략' 안내가 달라집니다."
        type: enum
        required: false
        default: "새 브랜치를 파서 작업"
        options: ["새 브랜치를 파서 작업", "git worktree로 작업", "기본 브랜치에 직접 작업"]

      # 위 선택에 맞춰 engine 이 development SKILL.md 에 주입하는 안내 블록(설문에는 표시 안 함).
      - key: dev.branch_strategy_guide
        question: "(자동 생성)"
        type: text
        required: false
        ui_hidden: true
        default: ""

      - key: dev.code_style_notes
        question: "꼭 지킬 코드 스타일 규칙"
        help: "자유 입력. 없으면 비워두세요."
        type: text
        required: false
        default: ""

      - key: gh.default_branch
        question: "기본(보호) 브랜치"
        type: combo
        required: false
        default: "main"
        options: ["main", "master", "develop"]

      - key: gh.commit_convention
        question: "커밋 메시지 컨벤션"
        help: "두 가지 중 하나를 고릅니다.\n• Conventional Commits — `type(scope): 제목` 형식. type 은 feat(새 기능)·fix(버그수정)·docs·refactor·test·chore 등. 예) `feat(auth): 로그인 추가`\n• 일반 텍스트 — 정해진 형식 없이 자유롭게 쓰는 평문 메시지. 예) `로그인 기능 추가`"
        type: enum
        required: false
        default: "Conventional Commits"
        options: ["Conventional Commits", "일반 텍스트"]

      - key: gh.commit_language
        question: "커밋 메시지 언어"
        type: enum
        required: false
        default: "한국어"
        options: ["한국어", "English"]

      - key: gh.branch_naming
        question: "브랜치 네이밍 규칙"
        type: string
        required: false
        default: "feature/<설명>, fix/<설명>"

  # ====================================================== STEP 3: 문서 작성
  - id: docs
    label: "3. 문서 작성"
    description: "건너뛰면 기본값(한국어·간결·Markdown)이 적용됩니다."
    skippable: true
    fields:
      - key: docs.language
        question: "문서·주석의 기본 언어"
        type: enum
        required: false
        default: "한국어"
        options: ["한국어", "English"]
      - key: docs.tone
        question: "문서 톤"
        type: enum
        required: false
        default: "간결하게"
        options: ["간결하게", "자세하게", "격식있게"]
      - key: docs.primary_format
        question: "주로 만들 문서 형식"
        type: enum
        required: false
        default: "Markdown"
        options: ["Markdown", "Word(docx)", "둘 다"]

  # ====================================================== STEP 4: 인증 & MCP
  # 이 스텝의 필드는 mcp_catalog.yaml 기반으로 UI가 동적 렌더링한다.
  # 답변 형태: { "mcp.servers": [id...], "mcp.tokens": { VAR: value } }
  - id: integrations
    label: "4. 연동 & 인증"
    description: "정말 필요한 소수만 고르세요 — 도구가 많을수록 좋은 게 아니라, 겹치거나 모호한 도구는 에이전트를 오히려 헷갈리게 합니다. 도구가 요구하는 인증키만 입력하면 되고, 전부 건너뛸 수도 있습니다."
    skippable: true
    dynamic: mcp_catalog
    fields: []
